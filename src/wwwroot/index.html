<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitDD</title>
    <meta name="description" content="Your GitHub profile, turned into a D&amp;D character sheet." />
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="GitDD.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <script>
        (function () {
            var redirect = sessionStorage.getItem('GitDD-redirect');
            if (redirect) {
                sessionStorage.removeItem('GitDD-redirect');
                history.replaceState(null, '', redirect);
            }
        })();
    </script>
</head>

<body>
    <div id="app">
        <div class="sheet-page">
            <div class="message-card loading-card">
                <p class="message-kicker">GitDD</p>
                <p>Unfurling the character sheet...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#10005;</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
